<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fertilizer AI | Farm Central</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="css/premium-theme.css" rel="stylesheet">
    <style>
        body { background: #090e17; color: #f8fafc; font-family: 'Outfit', sans-serif; overflow-x: hidden; margin: 0; }
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.15; animation: float 15s ease-in-out infinite alternate; pointer-events: none; }
        .orb-1 { width: 40vw; height: 40vw; background: #10b981; top: -10vh; left: -10vw; }
        .orb-2 { width: 50vw; height: 50vw; background: #eab308; bottom: -20vh; right: -10vw; animation-delay: -5s; }
        .glass-panel { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); border-radius: 2rem; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">
    <div class="bg-orb orb-1"></div><div class="bg-orb orb-2"></div>
    <button onclick="window.history.back()" class="fixed top-6 left-6 z-50 w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-white shadow-lg hover:bg-white/10 transition">←</button>
    <div class="max-w-5xl mx-auto pt-16 md:pt-10">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 pl-4 md:pl-12 gap-4">
            <div>
                <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-yellow-400 tracking-tight">SMART FERTILIZER</h1>
                <p class="text-slate-400 font-medium text-lg mt-1">AI-driven nutrient ratio and soil balancing</p>
            </div>
            <button onclick="window.location.href='dashboard.html'" class="px-6 py-3 rounded-2xl bg-white/5 border border-white/10 text-white font-bold hover:bg-emerald-500/10 transition shadow-lg">🏠 Dashboard</button>
        </header>

        <div class="glass-panel p-8 md:p-12 mb-8 relative overflow-hidden group border-t-4 border-t-emerald-500">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3"><span class="text-3xl">🧪</span> Soil Test Data</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <input type="number" id="n" placeholder="Nitrogen (N)" class="bg-slate-900/60 p-4 rounded-xl border border-white/10 outline-none focus:border-emerald-500 transition">
                <input type="number" id="p" placeholder="Phosphorus (P)" class="bg-slate-900/60 p-4 rounded-xl border border-white/10 outline-none focus:border-emerald-500 transition">
                <input type="number" id="k" placeholder="Potassium (K)" class="bg-slate-900/60 p-4 rounded-xl border border-white/10 outline-none focus:border-emerald-500 transition">
                <input type="text" id="crop" placeholder="Crop Name" class="bg-slate-900/60 p-4 rounded-xl border border-white/10 outline-none focus:border-emerald-500 transition">
            </div>
            <button onclick="calcFertilizer()" id="calcBtn" class="w-full bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 px-8 py-4 rounded-xl font-bold text-lg transition shadow-lg shadow-emerald-500/30">Calculate Ratio</button>
            
            <div id="result" class="hidden mt-8">
                <div class="bg-emerald-500/10 p-6 rounded-2xl border border-emerald-500/20">
                    <h3 class="text-sm font-bold text-emerald-400 mb-2 uppercase tracking-widest">Recommended Action</h3>
                    <p id="ai-rec" class="text-white text-xl font-bold leading-relaxed">...</p>
                    <div class="mt-4 grid grid-cols-2 gap-4">
                        <div class="bg-black/30 p-4 rounded-xl border border-white/5 text-center">
                            <span class="text-xs text-slate-400 uppercase font-bold">Urea Required</span>
                            <p class="text-2xl font-black text-white mt-1">45 kg/acre</p>
                        </div>
                        <div class="bg-black/30 p-4 rounded-xl border border-white/5 text-center">
                            <span class="text-xs text-slate-400 uppercase font-bold">DAP Required</span>
                            <p class="text-2xl font-black text-white mt-1">20 kg/acre</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function calcFertilizer() {
            const btn = document.getElementById('calcBtn');
            btn.innerHTML = 'Analyzing NPK ratios...'; btn.disabled = true;
            setTimeout(() => {
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('ai-rec').innerText = 'Based on the deficient Nitrogen levels for the selected crop, apply a 4:2:1 NPK formulation. Avoid excessive potash to prevent root burn.';
                btn.innerHTML = 'Calculate Ratio'; btn.disabled = false;
            }, 1500);
        }
    </script>
</body>
</html>
