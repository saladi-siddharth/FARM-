<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Reports | Farm Central</title>
    <meta name="description" content="View your past AI Crop Doctor reports.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7007280990614643" crossorigin="anonymous"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/premium-theme.css" rel="stylesheet">
    <style>
        body {
            background: #090e17;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding-bottom: 2rem;
        }

        h1,
        h2,
        h3,
        .brand-font {
            font-family: 'Outfit', sans-serif;
        }

        /* Abstract glowing orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.15;
            animation: float 15s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .orb-1 {
            width: 40vw;
            height: 40vw;
            background: #06b6d4;
            top: -10vh;
            left: -10vw;
        }

        .orb-2 {
            width: 50vw;
            height: 50vw;
            background: #10b981;
            bottom: -20vh;
            right: -10vw;
            animation-delay: -5s;
        }

        .report-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .report-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5), 0 0 20px rgba(6, 182, 212, 0.15);
            border-color: rgba(6, 182, 212, 0.3);
            background: rgba(15, 23, 42, 0.7);
        }
    </style>
</head>

<body class="selection:bg-cyan-500/30 selection:text-cyan-200">
    <!-- Background Elements -->
    <div id="canvas-bg" class="fixed inset-0 z-[-2]"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 mt-12 md:mt-20 relative z-10 fade-in-up">

        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()"
                    class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-white hover:bg-white/10 transition hover-lift shadow-lg">
                    ←
                </button>
                <div>
                    <h1
                        class="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400 tracking-tight brand-font flex items-center gap-3">
                        Medical Reports
                    </h1>
                    <p class="text-[10px] md:text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">AI Crop
                        Doctor History</p>
                </div>
            </div>

            <button onclick="location.href='doctor.html'"
                class="w-full md:w-auto btn-premium bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white px-6 py-3.5 rounded-xl font-bold transition flex items-center justify-center gap-2 shadow-lg shadow-emerald-500/20 border border-emerald-400/50 hover-scale">
                <span class="text-xl">🩺</span>
                <span>New Diagnosis</span>
            </button>
        </header>

        <!-- Reports List -->
        <div class="glass-premium p-6 md:p-8 rounded-[2rem] border border-white/5 shadow-2xl relative min-h-[60vh]">
            <h2
                class="text-xl font-bold text-white brand-font mb-6 flex items-center gap-2 border-b border-white/5 pb-4">
                <span>📂</span> Scan History
            </h2>

            <div id="reports-list" class="space-y-4">
                <!-- Loading State -->
                <div class="flex flex-col items-center justify-center py-20 text-slate-500 gap-4">
                    <div class="w-10 h-10 border-4 border-slate-700 border-t-cyan-500 rounded-full animate-spin"></div>
                    <span class="text-xs font-bold uppercase tracking-widest text-cyan-400">Loading Database</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="js/toast.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) location.href = 'index.html';

        let mockReports = [
            {
                id: 1, created_at: new Date().toISOString(), scan_id: 'SCN-8472', diagnosis: 'Healthy Crop',
                treatment: 'Maintain current watering schedule. No signs of infection.', image_url: 'https://images.unsplash.com/photo-1574327263598-c11dc477b7ce?q=80&w=200'
            },
            {
                id: 2, created_at: new Date(Date.now() - 86400000 * 3).toISOString(), scan_id: 'SCN-1093', diagnosis: 'Nitrogen Deficiency',
                treatment: 'Apply nitrogen-rich fertilizer immediately. Increase watering frequency.', image_url: null
            },
            {
                id: 3, created_at: new Date(Date.now() - 86400000 * 7).toISOString(), scan_id: 'SCN-5621', diagnosis: 'Early Blight',
                treatment: 'Remove affected leaves. Apply copper-based fungicide.', image_url: 'https://images.unsplash.com/photo-1596541673894-39bf7aeeac34?q=80&w=200'
            }
        ];

        async function loadReports() {
            try {
                const res = await fetch('/api/doctor/history', { headers: { 'Authorization': token } });
                if (!res.ok) throw new Error("Offline");
                const reports = await res.json();
                renderReports(reports);
            } catch (e) {
                console.log("Using mock reports data for preview");
                renderReports(mockReports);
            }
        }

        function renderReports(reports) {
            const container = document.getElementById('reports-list');

            if (!reports || reports.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 text-slate-500 gap-3 opacity-60">
                        <div class="text-4xl mb-2">🌿</div>
                        <p class="text-sm font-bold uppercase tracking-widest">No history found</p>
                        <p class="text-xs">Your past diagnoses will appear here.</p>
                    </div>`;
                return;
            }

            // Sort desc
            reports.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            container.innerHTML = reports.map((r, index) => {
                const delay = index * 0.05;
                const isHealthy = r.diagnosis.includes('Healthy');
                const titleColor = isHealthy ? 'text-emerald-400 drop-shadow-[0_0_8px_rgba(16,185,129,0.3)]' : 'text-orange-400 drop-shadow-[0_0_8px_rgba(249,115,22,0.3)]';
                const tagBg = isHealthy ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-orange-500/10 text-orange-400 border-orange-500/20';

                return `
                <div class="report-card glass-premium p-6 rounded-2xl border border-white/5 flex flex-col md:flex-row justify-between md:items-center gap-6 animate-[fade-in-up_0.5s_forwards] opacity-0 shadow-md relative overflow-hidden" style="animation-delay: ${delay}s">
                    
                    <div class="absolute left-0 top-0 bottom-0 w-1 ${isHealthy ? 'bg-emerald-500' : 'bg-orange-500'}"></div>
                    
                    <div class="flex-1 pl-2">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="text-[10px] font-black uppercase tracking-widest text-slate-400 bg-black/40 px-2.5 py-1 rounded shadow-inner border border-white/5 flex items-center gap-2">
                                📅 ${new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}
                            </span>
                            <span class="text-[10px] font-bold font-mono tracking-widest bg-white/5 text-cyan-300 px-2 py-1 rounded border border-cyan-500/20 shadow-sm">${r.scan_id || 'ID-UNKNOWN'}</span>
                        </div>
                        
                        <h3 class="text-2xl font-black ${titleColor} mb-2 tracking-tight">${r.diagnosis}</h3>
                        
                        <div class="bg-black/30 p-3 rounded-xl border border-white/5 shadow-inner">
                            <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-1">Prescribed Action</p>
                            <p class="text-sm text-slate-200 font-medium leading-relaxed">${r.treatment || 'No treatment necessary.'}</p>
                        </div>
                    </div>
                    
                    <div class="shrink-0 flex flex-row md:flex-col gap-3 w-full md:w-auto mt-4 md:mt-0 pt-4 md:pt-0 border-t md:border-t-0 md:border-l border-white/5 md:pl-6">
                         ${r.image_url ? `<a href="${r.image_url}" target="_blank" class="flex-1 md:flex-none text-center px-4 py-3 bg-white/5 border border-white/10 text-white rounded-xl text-sm font-bold hover:bg-white/10 transition shadow-sm hover-scale flex items-center justify-center gap-2"><span class="text-lg">📷</span> Image</a>` : ''}
                         <button onclick="downloadPdf(${r.id || Date.now()})" class="flex-[2] md:flex-none px-4 py-3 bg-cyan-500/10 border border-cyan-500/20 text-cyan-400 rounded-xl text-sm font-bold hover:bg-cyan-500/20 hover:text-cyan-300 transition shadow-sm hover-scale flex items-center justify-center gap-2">
                            <span class="text-lg">📄</span> Download PDF
                         </button>
                    </div>
                </div>
            `}).join('');
        }

        async function downloadPdf(id) {
            toast.info('Generating PDF Report...');
            try {
                const res = await fetch(`/api/doctor/report/${id}`, { headers: { 'Authorization': token } });
                if (!res.ok) throw new Error("Offline or failed");
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `FarmCentral_Medical_Report_${id}.pdf`;
                document.body.appendChild(a); a.click(); a.remove();
                toast.success('Download Complete');
            } catch (e) {
                console.log("Mocking PDF download");
                setTimeout(() => toast.success('Mock PDF Downloaded (Offline Mode)'), 1000);
            }
        }

        loadReports();
    </script>
    <script src="js/mobile-nav.js"></script>
</body>

</html>
