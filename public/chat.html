<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Farm Chat | Next Gen</title>
    <meta name="description" content="Connect instantly with buyers, sellers, and other farmers through Farm Chat.">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7007280990614643" crossorigin="anonymous"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="css/premium-theme.css" rel="stylesheet">
    <style>
        body {
            background: #090e17;
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        .brand-font {
            font-family: 'Outfit', sans-serif;
        }

        /* Abstract glowing orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.15;
            animation: float 15s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .orb-1 {
            width: 50vw;
            height: 50vw;
            background: #10b981;
            top: -10vh;
            right: -10vw;
        }

        .orb-2 {
            width: 40vw;
            height: 40vw;
            background: #3b82f6;
            bottom: -20vh;
            left: -10vw;
            animation-delay: -5s;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .chat-area {
            background: transparent;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .msg-bubble {
            max-width: 70%;
            padding: 14px 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .my-msg {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border-radius: 20px 20px 4px 20px;
            margin-right: 4px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .their-msg {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            border-radius: 20px 20px 20px 4px;
            margin-left: 4px;
            backdrop-filter: blur(10px);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .chat-item.active {
            background: rgba(16, 185, 129, 0.1);
            border-left: 3px solid #10b981;
            box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.05);
        }

        .input-dock {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: env(safe-area-inset-bottom);
        }

        button:active,
        .hover-scale:active {
            transform: scale(0.96);
        }

        button {
            transition: transform 0.2s ease, background-color 0.2s, box-shadow 0.2s;
        }

        #call-modal {
            background: rgba(9, 14, 23, 0.9);
            backdrop-filter: blur(20px);
        }
    </style>
</head>

<body class="flex selection:bg-emerald-500/30 selection:text-emerald-200" style="background: transparent;">
    <!-- Background Elements -->
    <div id="canvas-bg" class="fixed inset-0 z-[-2]"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <!-- Sidebar (Contacts) -->
    <div id="sidebar"
        class="w-full md:w-80 glass-panel h-full flex flex-col z-20 absolute md:relative transition-transform duration-300 md:translate-x-0 -translate-x-full">

        <!-- Sidebar Header -->
        <div class="p-6 pb-4 pl-24 pt-16 md:pl-6 md:pt-8 bg-transparent">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-500 flex items-center justify-center text-white shadow-[0_0_15px_rgba(16,185,129,0.3)] border border-emerald-400/50">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
                            </path>
                        </svg>
                    </div>
                    <h2
                        class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 tracking-tight brand-font">
                        FarmChat</h2>
                </div>

                <div class="flex gap-2 items-center">
                    <button onclick="localStorage.clear(); location.href='index.html'"
                        class="p-2 rounded-lg bg-rose-500/10 hover:bg-rose-500 hover:text-white text-rose-400 transition border border-rose-500/20"
                        title="Logout">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                            </path>
                        </svg>
                    </button>
                    <!-- Status Indicator -->
                    <div
                        class="h-3 w-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981] animate-pulse border-2 border-[#090e17]">

            <!-- Search -->
            <div class="relative group mt-2">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-slate-500 group-focus-within:text-emerald-500 transition" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                <input type="text" id="userSearch" placeholder="Search farmers..."

                    oninput="searchUsers(this.value)">

        </div>

        <!-- Recent Chats List -->

    <!-- Main Chat Interface -->

            <!-- Call Actions -->

                <button onclick="startCall('voice')"

                <button onclick="startCall('video')"

                    title="Video Call">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Messages Area -->
        <div id="msgContainer" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 flex flex-col scroll-smooth">
            <div class="flex-1 flex flex-col items-center justify-center select-none text-slate-500/40">

                    <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
                    </svg>

                <p class="text-2xl font-black brand-font text-slate-400 tracking-tight">Farm Chat</p>
                <p class="text-sm font-bold uppercase tracking-widest mt-2">Select a contact to begin</p>

        <!-- Smart Replies -->

        </div>

        <!-- Input Dock -->
        <div id="input-area" class="input-dock p-4 md:px-8 md:py-6 relative z-10">
            <!-- Preview Attachment -->
            <div id="attachment-preview"

                <div class="flex items-center gap-3">
                    <span class="p-2 bg-indigo-500/20 rounded-lg text-indigo-400">📎</span>
                    <span id="file-name"

                </div>

                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">

    <!-- Video Call Modal -->
    <div id="call-modal"
        class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center p-4 transition-opacity duration-300">
        <!-- Kept original modal structure mostly same but with refined borders -->
        <div
            class="relative w-full max-w-5xl aspect-video bg-[#05080f] rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/10 flex flex-col group ring-4 ring-emerald-500/20">

            <div

                    <div class="relative">
                        <div
                            class="w-3 h-3 rounded-full bg-rose-500 animate-pulse absolute top-0 right-0 ring-2 ring-black">

            <video id="remote-video" autoplay playsinline class="w-full h-full object-cover bg-slate-900"></video>

            <div

            <div
                class="absolute bottom-0 left-0 right-0 pb-10 pt-24 flex justify-center gap-6 bg-gradient-to-t from-black/90 via-black/50 to-transparent z-10 pointer-events-auto">

                    class="w-14 h-14 rounded-2xl bg-white/10 hover:bg-white/20 text-white backdrop-blur-md border border-white/20 flex items-center justify-center transition shadow-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z">
                        </path>
                    </svg>
                </button>

                <button onclick="endCallSignal()"
                    class="w-16 h-16 rounded-3xl bg-rose-600 hover:bg-rose-500 text-white shadow-[0_0_20px_rgba(225,29,72,0.4)] flex items-center justify-center transition focus:scale-95 border-2 border-rose-400/50">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.516l2.257-1.13a1 1 0 00.502-1.21L8.228 8.02A1 1 0 007.28 7H6a2 2 0 00-2 2v1z">
                        </path>
                    </svg>
                </button>

                <button onclick="toggleCam()" id="cam-btn"
                    class="w-14 h-14 rounded-2xl bg-white/10 hover:bg-white/20 text-white backdrop-blur-md border border-white/20 flex items-center justify-center transition shadow-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Global Scripts -->
    <script>
        // Use existing logic, completely omitted for brevity but normally kept exactly the same
        let currentChatId = null;
        let currentChatName = '';
        const token = localStorage.getItem('token');
        const myUsername = localStorage.getItem('username') || parseJwt(token).username || 'Farmer';

        function parseJwt(token) {
            try { return JSON.parse(atob(token.split('.')[1])); } catch (e) { return {}; }
        }

        const socket = io();
        let localStream;
        let peerConnection;
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        let callTimerInt;

        if (!token) location.href = 'index.html';

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('-translate-x-full');
            sb.classList.toggle('absolute');
        }

        const activeUsersSet = new Set();

        socket.on('connect', () => { socket.emit('user-online', myUsername); });
        socket.on('active-users-list', (users) => { users.forEach(u => activeUsersSet.add(u)); updatePresenceUI(); });
        socket.on('user-status', (data) => {
            if (data.status === 'online') activeUsersSet.add(data.username);
            else activeUsersSet.delete(data.username);
            updatePresenceUI();
            if (data.username === currentChatName) updateHeaderStatus(data.status === 'online');
        });

        function updatePresenceUI() { loadConversations(); }

        function updateHeaderStatus(isOnline) {
            const statusEl = document.getElementById('chat-status');
            if (isOnline) {
                statusEl.classList.remove('hidden');
                statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse border border-emerald-400/50 shadow-[0_0_5px_#10b981]"></span> Online`;
            } else {
                statusEl.innerHTML = `<span class="text-slate-500 font-bold uppercase tracking-widest">Offline</span>`;
                statusEl.classList.remove('hidden');
            }
        }

        async function loadConversations() {
            try {
                const res = await fetch('/api/chat/conversations', { headers: { 'Authorization': token } });
                const list = await res.json();
                const container = document.getElementById('conversationsList');

                if (!list || list.length === 0) {
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-48 text-slate-500 opacity-60 bg-black/20 rounded-2xl border border-white/5 m-4">
                            <span class="text-4xl mb-2">📭</span>
                            <p class="text-xs font-bold uppercase tracking-widest">No chats yet</p>
                        </div>`;
                    return;
                }

                container.innerHTML = list.map(c => {
                    const isOnline = activeUsersSet.has(c.username);
                    const isActive = currentChatId === c.id;
                    return `
                    <div onclick="selectUser(${c.id}, '${c.username}')" 
                        class="chat-item p-4 rounded-2xl cursor-pointer flex items-center gap-4 transition group relative overflow-hidden ${isActive ? 'active bg-emerald-500/10' : 'hover:bg-white/5 border border-transparent'}">
                        
                        <div class="relative w-12 h-12 flex-shrink-0">
                             <div class="w-full h-full rounded-xl bg-gradient-to-br from-slate-700 to-slate-800 flex items-center justify-center text-white font-black border border-white/10 ${isOnline ? 'ring-2 ring-emerald-500 shadow-lg shadow-emerald-500/20' : ''}">
                                <span class="text-xl">${c.username[0].toUpperCase()}</span>
                            </div>
                            ${isOnline ? '<div class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-emerald-500 border-2 border-[#090e17] rounded-full z-10"></div>' : ''}
                        </div>
                        
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-baseline mb-1">
                                <h4 class="font-bold text-slate-200 truncate group-hover:text-white transition ${isActive ? 'text-white' : ''} text-base">${c.username}</h4>
                                <span class="text-[10px] ${isActive ? 'text-emerald-400' : 'text-slate-500'} font-bold uppercase tracking-widest">${timeAgo(c.messaged_at)}</span>
                            </div>
                            <p class="text-xs truncate ${isActive ? 'text-emerald-200/70' : 'text-slate-400'} group-hover:text-slate-300 transition font-medium">
                                ${c.msg_type === 'text' ? (c.sender_username === myUsername ? '<span class="opacity-50">You: </span>' : '') + c.content : '📎 Attachment'}
                            </p>
                        </div>
                    </div>
                `}).join('');
            } catch (e) { console.error(e); }
        }

        async function searchUsers(q) {
            if (q.length < 1) { loadConversations(); return; }
            const res = await fetch(`/api/chat/search?q=${q}`, { headers: { 'Authorization': token } });
            const users = await res.json();
            const container = document.getElementById('conversationsList');

            container.innerHTML = users.length ? users.map(u => {
                const isOnline = activeUsersSet.has(u.username);
                return `
                <div onclick="selectUser(${u.id}, '${u.username}')" class="chat-item p-4 rounded-2xl hover:bg-white/5 cursor-pointer flex items-center gap-4 transition group border border-transparent">
                   <div class="relative w-12 h-12 flex-shrink-0">
                        <div class="w-full h-full rounded-xl bg-slate-800 flex items-center justify-center text-emerald-400 font-bold border border-white/5 group-hover:border-emerald-500/50 transition shadow-inner">
                            <span class="text-lg">🔍</span>
                        </div>
                    </div>
                    <p class="font-bold text-slate-200 group-hover:text-white transition text-base">${u.username}</p>
                </div>
            `}).join('') : '<div class="text-center text-slate-500 text-xs font-bold uppercase tracking-widest mt-10">No farmers found</div>';
        }

        function selectUser(id, name) {
            currentChatId = id;
            currentChatName = name;

            document.getElementById('chat-name').innerText = name;
            document.getElementById('header-avatar').innerText = name[0].toUpperCase();
            document.getElementById('header-avatar').classList.remove('hidden');
            document.getElementById('chat-status').classList.remove('hidden');
            document.getElementById('call-actions').classList.remove('hidden');

            const isOnline = activeUsersSet.has(name);
            updateHeaderStatus(isOnline);

            document.getElementById('msgInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;

            loadMessages();
            loadConversations();

            if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('-translate-x-full');
        }

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        async function toggleRecording() {
            if (isRecording) stopRecording();
            else startRecording();
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                isRecording = true;
                let mimeType = 'audio/webm';
                if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType = 'audio/webm;codecs=opus';
                else if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4';

                mediaRecorder = new MediaRecorder(stream, { mimeType });
                audioChunks = [];

                mediaRecorder.ondataavailable = event => { if (event.data.size > 0) audioChunks.push(event.data); };

                mediaRecorder.onstop = async () => {
                    isRecording = false;
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    const file = new File([audioBlob], "voice_msg.webm", { type: mimeType });
                    if (audioBlob.size < 100) return;

                    const formData = new FormData();
                    formData.append('media', file);
                    formData.append('content', 'Voice Message 🎤');

                    const btn = document.getElementById('recordBtn');
                    try {
                        const res = await fetch(`/api/chat/${currentChatId}`, { method: 'POST', body: formData, headers: { 'Authorization': token } });
                        if (res.ok) { loadMessages(); loadConversations(); }
                    } catch (e) { alert("Failed to send"); }

                    stream.getTracks().forEach(t => t.stop());
                    audioChunks = [];
                    document.getElementById('recording-ui').classList.add('hidden');
                };

                mediaRecorder.start();
                document.getElementById('recording-ui').classList.remove('hidden');
            } catch (e) { console.error(e); }
        }

        function stopRecording() { if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); isRecording = false; } }
        function cancelRecording() {
            if (mediaRecorder) {
                mediaRecorder.onstop = null; mediaRecorder.stop(); isRecording = false; audioChunks = [];
                document.getElementById('recording-ui').classList.add('hidden');
                if (mediaRecorder.stream) mediaRecorder.stream.getTracks().forEach(t => t.stop());
            }
        }

        let lastMsgCount = 0;
        const msgInput = document.getElementById('msgInput');
        let typingTimeout;

        msgInput.addEventListener('input', () => {
            if (!currentChatId) return;
            socket.emit('typing', { chatId: currentChatId, username: myUsername });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { socket.emit('stop-typing', { chatId: currentChatId, username: myUsername }); }, 1000);
        });

        socket.on('typing', (data) => {
            if (data.chatId == currentChatId && data.username !== myUsername) {
                document.getElementById('chat-status').classList.remove('hidden');
                document.getElementById('chat-status').innerHTML = `<span class="animate-pulse font-bold text-emerald-400 uppercase tracking-widest text-[10px]">Typing...</span>`;
            }
        });

        socket.on('stop-typing', (data) => {
            if (data.chatId == currentChatId && data.username !== myUsername) {
                updateHeaderStatus(activeUsersSet.has(data.username));
            }
        });

        function generateSmartReplies(lastMsg) {
            const replies = [];
            const m = lastMsg.toLowerCase();
            if (m.includes('price') || m.includes('cost')) replies.push("It is ₹50/kg", "Market price is high", "Let's negotiate");
            else if (m.includes('hello') || m.includes('hi')) replies.push("Namaste! 🙏", "Hello, how are you?", "Updates?");
            else if (m.includes('available') || m.includes('stock')) replies.push("Yes, available.", "Out of stock.", "Check profile.");
            else if (m.includes('thank')) replies.push("Welcome!", "No problem.", "Happy to help.");
            else replies.push("Okay 👍", "I will call.", "Send details.");

            const container = document.getElementById('smart-replies');
            container.innerHTML = replies.map(r => `
                <button onclick="sendSmartReply('${r}')" class="px-4 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-xs font-bold text-slate-300 transition whitespace-nowrap shadow-sm hover:text-white">
                    ${r}
                </button>
            `).join('');
            container.classList.remove('hidden');
        }

        function sendSmartReply(text) {
            document.getElementById('msgInput').value = text;
            document.getElementById('smart-replies').classList.add('hidden');
            document.getElementById('chatForm').dispatchEvent(new Event('submit'));
        }

        async function loadMessages() {
            if (!currentChatId) return;
            const res = await fetch(`/api/chat/${currentChatId}`, { headers: { 'Authorization': token } });
            const msgs = await res.json();
            if (msgs.length === lastMsgCount) return;
            lastMsgCount = msgs.length;

            const container = document.getElementById('msgContainer');
            container.innerHTML = msgs.map(m => {
                const isMe = m.sender_username === myUsername;
                let contentHtml = '';
                if (m.msg_type === 'image') contentHtml = `<img src="${m.media_url}" class="rounded-xl max-w-full h-auto mt-2 border border-black/20 cursor-pointer hover:scale-[1.02] transition shadow-md">`;
                else if (m.msg_type === 'video') contentHtml = `<video src="${m.media_url}" controls class="rounded-xl max-w-full h-auto mt-2 border border-black/20 shadow-md"></video>`;
                else if (m.msg_type === 'audio') contentHtml = `<audio src="${m.media_url}" controls class="mt-2 w-64 h-10 filter drop-shadow hover:scale-[1.02] transition"></audio>`;
                else contentHtml = `<p class="font-medium">${m.content}</p>`;

                return `
                    <div class="flex w-full ${isMe ? 'justify-end' : 'justify-start'} animate-fade-in-up" style="animation-duration: 0.3s">
                        <div class="msg-bubble ${isMe ? 'my-msg' : 'their-msg'}">
                            ${!isMe ? `<div class="text-[10px] font-black uppercase tracking-widest text-[#10b981] mb-1.5">${m.sender_username}</div>` : ''}
                            ${contentHtml}
                            <div class="text-[10px] font-bold opacity-50 text-right mt-2 tracking-wider ${isMe ? 'text-teal-100' : 'text-slate-500'}">${new Date(m.messaged_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                        </div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;

            if (msgs.length > 0) {
                const last = msgs[msgs.length - 1];
                if (last.sender_username !== myUsername && last.msg_type === 'text') generateSmartReplies(last.content);
                else document.getElementById('smart-replies')?.classList.add('hidden');
            }
        }

        setInterval(() => { if (currentChatId) loadMessages(); }, 1500);
        setInterval(loadConversations, 5000);
        loadConversations();

        function handleFile(input) {
            const file = input.files[0];
            if (file) {
                document.getElementById('attachment-preview').classList.remove('hidden');
                document.getElementById('file-name').innerText = file.name;
            }
        }
        function clearAttachment() {
            document.getElementById('mediaInput').value = '';
            document.getElementById('attachment-preview').classList.add('hidden');
        }

        document.getElementById('chatForm').onsubmit = async (e) => {
            e.preventDefault();
            const content = document.getElementById('msgInput').value;
            const fileInput = document.getElementById('mediaInput');
            if (!content.trim() && !fileInput.files.length) return;

            const formData = new FormData();
            formData.append('content', content);
            if (fileInput.files.length) formData.append('media', fileInput.files[0]);

            document.getElementById('msgInput').value = '';
            clearAttachment();
            const res = await fetch(`/api/chat/${currentChatId}`, { method: 'POST', headers: { 'Authorization': token }, body: formData });
            if (res.ok) { loadMessages(); loadConversations(); }
        };

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + 'm ago';
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + 'h ago';
            return Math.floor(hours / 24) + 'd ago';
        }

        // WebRTC functions remain same logic
        let incomingCallData = null;
        socket.on('incoming-call', (data) => {
            if (data.targetUsername !== myUsername) return;
            incomingCallData = data;
            const modal = document.getElementById('call-modal');
            modal.classList.remove('hidden');
            document.getElementById('call-status-text').innerText = `Incoming Call from ${data.callerName}`;

            if (!document.getElementById('accept-btn')) {
                const controls = document.querySelector('#call-modal .absolute.bottom-0');
                controls.innerHTML = `
                    <button onclick="rejectCall()" class="w-16 h-16 rounded-3xl bg-rose-600 hover:bg-rose-500 text-white font-bold shadow-lg transition flex items-center justify-center border-2 border-rose-400">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                    <button onclick="acceptCall()" id="accept-btn" class="w-16 h-16 rounded-3xl bg-emerald-500 hover:bg-emerald-400 text-white font-bold shadow-[0_0_20px_rgba(16,185,129,0.5)] transition animate-bounce flex items-center justify-center border-2 border-emerald-300">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    </button>
                `;
            }
        });

        socket.on('call-started', async (data) => {
            if (isCaller && data.roomId === currentRoomId) {
                document.getElementById('call-status-text').innerText = "Connecting...";
                initializeWebRTC(data.roomId);
            }
        });

        socket.on('call-ended', (data) => {
            if (data.roomId === currentRoomId) endCallUI();
        });

        let isCaller = false;
        let currentRoomId = null;

        async function startCall(type) {
            isCaller = true;
            currentRoomId = `call_${[currentChatName, myUsername].sort().join('_')}`;
            document.getElementById('call-modal').classList.remove('hidden');
            document.getElementById('call-status-text').innerText = `Calling ${currentChatName}...`;

            const controls = document.querySelector('#call-modal .absolute.bottom-0');
            controls.innerHTML = `
                <button onclick="endCallSignal()" class="w-16 h-16 rounded-3xl bg-rose-600 hover:bg-rose-500 text-white font-bold flex items-center justify-center border-2 border-rose-400">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>`;

            socket.emit('call-request', { roomId: currentRoomId, callerName: myUsername, targetUsername: currentChatName });
        }

        async function acceptCall() {
            currentRoomId = incomingCallData.roomId;
            isCaller = false;
            document.getElementById('call-status-text').innerText = "Connected";
            restoreCallControls();
            socket.emit('call-accepted', { roomId: currentRoomId });
            initializeWebRTC(currentRoomId);
        }

        function rejectCall() { socket.emit('call-rejected', { roomId: incomingCallData.roomId }); endCallUI(); }
        function endCallSignal() { socket.emit('call-rejected', { roomId: currentRoomId }); endCallUI(); }
        function endCallUI() {
            document.getElementById('call-modal').classList.add('hidden');
            if (peerConnection) peerConnection.close();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            clearInterval(callTimerInt);
        }

        function restoreCallControls() {
            // Replaces the UI with the 3 connected buttons (Mute, End, Cam)
            const controls = document.querySelector('#call-modal .absolute.bottom-0');
            controls.innerHTML = `
                <button onclick="toggleMute()" id="mute-btn" class="w-14 h-14 rounded-2xl bg-white/10 hover:bg-white/20 text-white backdrop-blur-md border border-white/20 flex items-center justify-center transition shadow-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg></button>
                <button onclick="endCallSignal()" class="w-16 h-16 rounded-3xl bg-rose-600 hover:bg-rose-500 text-white shadow-[0_0_20px_rgba(225,29,72,0.4)] flex items-center justify-center transition border-2 border-rose-400/50"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.516l2.257-1.13a1 1 0 00.502-1.21L8.228 8.02A1 1 0 007.28 7H6a2 2 0 00-2 2v1z"></path></svg></button>
                <button onclick="toggleCam()" id="cam-btn" class="w-14 h-14 rounded-2xl bg-white/10 hover:bg-white/20 text-white backdrop-blur-md border border-white/20 flex items-center justify-center transition shadow-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>
            `;
        }

        async function initializeWebRTC(roomId) {
            startTimer();
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('local-video').srcObject = localStream;

                socket.emit('join-room', roomId, myUsername);
                peerConnection = new RTCPeerConnection(rtcConfig);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                peerConnection.ontrack = (event) => { document.getElementById('remote-video').srcObject = event.streams[0]; };
                peerConnection.onicecandidate = (event) => { if (event.candidate) socket.emit('ice-candidate', { roomId, candidate: event.candidate }); };

                if (isCaller) {
                    const offer = await peerConnection.createOffer();
                    await peerConnection.setLocalDescription(offer);
                    socket.emit('offer', { roomId, offer });
                }
            } catch (e) { alert("Media Error. Ensure camera is permitted."); endCallUI(); }
        }

        socket.on('offer', async (data) => {
            if (data.roomId !== currentRoomId) return;
            try {
                if (!peerConnection) await initializeWebRTC(data.roomId);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('answer', { roomId: data.roomId, answer });
                document.getElementById('call-status-text').innerText = "Connected";
            } catch (e) { console.error(e); }
        });

        socket.on('answer', async (data) => { await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer)); });
        socket.on('ice-candidate', async (data) => { if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); });

        function startTimer() {
            let sec = 0;
            const el = document.getElementById('call-timer');
            clearInterval(callTimerInt);
            callTimerInt = setInterval(() => {
                sec++;
                el.innerText = `${Math.floor(sec / 60).toString().padStart(2, '0')}:${(sec % 60).toString().padStart(2, '0')}`;
            }, 1000);
        }

        function toggleMute() {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            // Add UI toggle logic if needed
        }
        function toggleCam() {
            const track = localStream.getVideoTracks()[0];
            if (track) track.enabled = !track.enabled;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const targetUser = urlParams.get('chat_with');
        if (targetUser) {
            document.getElementById('userSearch').value = targetUser;
            setTimeout(() => { searchUsers(targetUser); }, 500);
        }
    </script>
</body>
