<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmers Community | Farm Central</title>
    <meta name="description" content="Farmers Community — Connect with fellow farmers">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7007280990614643" crossorigin="anonymous"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/premium-theme.css" rel="stylesheet">
    <style>
        body {
            background: #090e17;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding-bottom: 2rem;
        }

        h1,
        h2,
        h3,
        .brand-font {
            font-family: 'Outfit', sans-serif;
        }

        /* Abstract glowing orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.15;
            animation: float 15s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .orb-1 {
            width: 50vw;
            height: 50vw;
            background: #3b82f6;
            top: -10vh;
            right: -10vw;
        }

        .orb-2 {
            width: 40vw;
            height: 40vw;
            background: #a855f7;
            bottom: -20vh;
            left: -10vw;
            animation-delay: -5s;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="selection:bg-blue-500/30 selection:text-blue-200">
    <!-- Background Elements -->
    <div id="canvas-bg" class="fixed inset-0 z-[-2]"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div
        class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 mt-12 md:mt-20 relative z-10 fade-in-up h-screen flex flex-col pt-12">

        <!-- Header -->
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10 gap-6 shrink-0 z-20">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()"
                    class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-white hover:bg-white/10 transition hover-lift shadow-lg">
                    ←
                </button>
                <div>
                    <h1
                        class="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 tracking-tight brand-font flex items-center gap-3">
                        Community
                    </h1>
                    <p class="text-[10px] md:text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Global
                        Farmers Network</p>
                </div>
            </div>

            <button onclick="location.href='chat.html'"
                class="w-full sm:w-auto btn-premium bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white px-6 py-3.5 rounded-xl font-bold transition flex items-center justify-center gap-2 shadow-lg shadow-emerald-500/20 border border-emerald-400/50 hover-scale">
                <span class="text-lg">💬</span>
                <span>Direct Messages</span>
            </button>
        </header>

        <!-- Post Box -->
        <div
            class="glass-premium p-6 rounded-[2rem] border border-white/5 mb-8 shadow-2xl relative overflow-hidden group shrink-0">
            <!-- Decorative Glow -->
            <div
                class="absolute -right-20 -bottom-20 w-64 h-64 bg-blue-500/10 blur-[80px] rounded-full pointer-events-none group-hover:bg-blue-500/20 transition duration-500">
            </div>

            <form id="postForm" class="flex flex-col gap-4 relative z-10">
                <div class="flex gap-4">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center font-bold text-white shadow-inner flex-shrink-0 border-2 border-white/10"
                        id="current-user-avatar">
                        M
                    </div>
                    <textarea id="postContent" placeholder="Ask a question, share a tip, or request help..."
                        class="w-full bg-black/40 p-4 rounded-xl border border-white/10 outline-none focus:border-blue-500/50 h-28 resize-none transition text-white placeholder-slate-500 font-medium custom-scrollbar shadow-inner"></textarea>
                </div>

                <!-- Media Preview -->
                <div id="mediaPreview"
                    class="hidden relative w-32 h-32 ml-16 rounded-xl overflow-hidden border border-white/10 shadow-lg group/media">
                    <img id="previewImg" class="w-full h-full object-cover">
                    <div
                        class="absolute inset-0 bg-black/50 opacity-0 group-hover/media:opacity-100 transition flex items-center justify-center">
                        <button type="button" onclick="clearMedia()"
                            class="w-8 h-8 rounded-full bg-rose-500 text-white flex items-center justify-center hover:scale-110 shadow-lg transition">✕</button>
                    </div>
                </div>

                <div class="flex justify-between items-center ml-16 mt-2 pt-4 border-t border-white/5">
                    <label
                        class="cursor-pointer text-slate-400 hover:text-blue-400 flex items-center gap-2 transition group/upload">
                        <span
                            class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-xl group-hover/upload:bg-blue-500/10 group-hover/upload:border-blue-500/30 transition shadow-sm">📷</span>
                        <span class="text-sm font-bold tracking-wide">Photo/Video</span>
                        <input type="file" id="mediaInput" class="hidden" accept="image/*,video/*"
                            onchange="handleFileSelect(this)">
                    </label>
                    <button type="submit" id="postBtn"
                        class="btn-premium bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-8 py-3 rounded-xl font-black uppercase tracking-widest shadow-lg shadow-blue-500/20 border border-blue-400/30 transition hover-scale flex items-center justify-center gap-2">
                        Post Event
                    </button>
                </div>
            </form>
        </div>

        <!-- Feed -->
        <div class="flex justify-between items-end mb-4 px-2 shrink-0">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span> Live Network Feed
            </h3>
            <select
                class="bg-transparent border-none text-blue-400 text-xs font-bold outline-none cursor-pointer hover:text-blue-300 transition appearance-none pr-4"
                style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2360a5fa%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right top 50%; background-size: 8px auto;">
                <option class="bg-slate-900">Latest</option>
                <option class="bg-slate-900">Top Rated</option>
            </select>
        </div>

        <div id="feed" class="flex-1 overflow-y-auto space-y-6 pr-2 custom-scrollbar pb-10">
            <div class="flex flex-col items-center justify-center py-20 text-slate-500 gap-4">
                <div class="w-10 h-10 border-4 border-slate-700 border-t-blue-500 rounded-full animate-spin"></div>
                <span class="text-xs font-bold uppercase tracking-widest text-blue-500">Syncing Network</span>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/toast.js"></script>
    <script>
        // --- FORUM LOGIC ---
        const token = localStorage.getItem('token');
        const currentUser = localStorage.getItem('username') || 'Me';

        if (!token) location.href = 'index.html';

        document.getElementById('current-user-avatar').innerText = currentUser.charAt(0).toUpperCase();

        let dummyFeed = [
            {
                id: 101, username: 'ElenaG', created_at: new Date(Date.now() - 3600000).toISOString(),
                content: 'Just successfully treated early-stage blight using organic neem oil mixture! The AI Doctor app was spot on. Highly recommend everyone to scan their tomatoes this week, weather is highly humid.',
                media_url: null, media_type: null, likes: 24, replies: 5
            },
            {
                id: 102, username: 'JohnTractor', created_at: new Date(Date.now() - 7200000).toISOString(),
                content: 'Anyone have experience with the new drip irrigation systems from AquaTech? Wondering if the setup cost is worth the water savings in the long term.',
                media_url: null, media_type: null, likes: 8, replies: 12
            }
        ];

        async function loadPosts() {
            try {
                const res = await fetch('/api/forum', { headers: { 'Authorization': token } });
                if (!res.ok) throw new Error("Offline");
                const data = await res.json();
                renderFeed(data);
            } catch (e) {
                console.log("Using local dummy feed");
                renderFeed(dummyFeed);
            }
        }

        function renderFeed(data) {
            const feed = document.getElementById('feed');
            if (!data || data.length === 0) {
                feed.innerHTML = `
                 <div class="glass-premium p-8 rounded-2xl border border-white/5 text-center text-slate-400 shadow-inner my-8">
                     <div class="w-16 h-16 rounded-full bg-white/5 mx-auto flex items-center justify-center text-3xl mb-4 border border-white/10">🌍</div>
                     <p class="font-bold mb-1 text-slate-200">No posts yet.</p>
                     <p class="text-sm">Be the first to start a conversation!</p>
                 </div>`;
                return;
            }

            // Sort desc
            data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            feed.innerHTML = data.map((p, i) => {
                const isMe = p.username === currentUser;
                const delay = i * 0.05;

                // Generate randomish colors for avatars
                const colors = ['from-rose-500 to-pink-600', 'from-emerald-400 to-teal-500', 'from-amber-400 to-orange-500', 'from-indigo-500 to-purple-500'];
                const colorClass = isMe ? 'from-blue-500 to-purple-600' : colors[p.username.length % colors.length];

                return `
                 <div class="glass-premium p-6 rounded-[2rem] border border-white/5 relative group animate-[fade-in-up_0.5s_forwards] opacity-0 hover:border-white/10 transition-colors duration-300 shadow-lg" style="animation-delay: ${delay}s">
                     
                     ${isMe ? `<button onclick="deletePost(${p.id})" class="absolute top-6 right-6 text-rose-500 opacity-0 group-hover:opacity-100 transition hover:bg-rose-500 hover:text-white w-8 h-8 rounded-xl flex items-center justify-center border border-transparent hover:border-rose-400 shadow-sm" title="Delete Post"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>` : ''}
                     
                     <div class="flex items-center gap-4 mb-4">
                         <div class="w-12 h-12 rounded-full bg-gradient-to-br ${colorClass} flex items-center justify-center font-bold text-white shadow-inner border-2 border-white/10 text-lg">
                             ${p.username[0].toUpperCase()}
                         </div>
                         <div>
                             <div class="font-bold text-white flex items-center gap-2">
                                 @${p.username}
                                 ${isMe ? '<span class="px-1.5 py-0.5 rounded text-[9px] font-black uppercase tracking-wider bg-blue-500/20 text-blue-400 border border-blue-500/30">You</span>' : ''}
                             </div>
                             <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">${timeAgo(new Date(p.created_at))}</div>
                         </div>
                     </div>
                     
                     <p class="text-slate-200 leading-relaxed mb-4 text-sm md:text-base font-medium">${p.content}</p>
                     
                     ${p.media_url ? renderMedia(p.media_url, p.media_type) : ''}

                     <div class="flex gap-6 mt-4 pt-4 border-t border-white/5">
                         <button class="flex items-center gap-2 text-slate-400 hover:text-rose-400 transition group/btn text-sm font-bold">
                             <div class="w-8 h-8 rounded-full bg-white/5 group-hover/btn:bg-rose-500/10 flex items-center justify-center border border-white/10 group-hover/btn:border-rose-500/30 transition">
                                 <svg class="w-4 h-4 group-hover/btn:-translate-y-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                             </div>
                             <span>${p.likes || 0}</span>
                         </button>
                         <button class="flex items-center gap-2 text-slate-400 hover:text-blue-400 transition group/btn text-sm font-bold">
                             <div class="w-8 h-8 rounded-full bg-white/5 group-hover/btn:bg-blue-500/10 flex items-center justify-center border border-white/10 group-hover/btn:border-blue-500/30 transition">
                                <svg class="w-4 h-4 group-hover/btn:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                             </div>
                             <span>${p.replies || 0}</span>
                         </button>
                     </div>
                 </div>
             `}).join('');
        }

        // Helper
        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + "y ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + "mo ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "d ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "h ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "m ago";
            return "Just now";
        }

        function renderMedia(url, type) {
            if (type === 'image') {
                return `<img src="${url}" class="w-full max-h-96 object-cover rounded-[1.5rem] border border-white/10 shadow-lg mt-2 mb-2">`;
            } else if (type === 'video') {
                return `<video src="${url}" controls class="w-full max-h-96 rounded-[1.5rem] border border-white/10 shadow-lg mt-2 mb-2 bg-black/50"></video>`;
            }
            return '';
        }

        function handleFileSelect(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('mediaPreview').classList.remove('hidden');
                    document.getElementById('previewImg').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function clearMedia() {
            document.getElementById('mediaInput').value = '';
            document.getElementById('mediaPreview').classList.add('hidden');
        }

        document.getElementById('postForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('postBtn');
            const ogText = btn.innerHTML;
            btn.innerHTML = '<span class="animate-spin">⏳</span>';
            btn.disabled = true;

            const content = document.getElementById('postContent').value;
            const fileInput = document.getElementById('mediaInput');

            if (!content.trim() && !fileInput.files.length) {
                btn.innerHTML = ogText; btn.disabled = false; return;
            }

            const formData = new FormData();
            formData.append('content', content);
            let hasImage = false;
            let imgData = null;

            if (fileInput.files.length) {
                formData.append('media', fileInput.files[0]);
                hasImage = true;
                imgData = document.getElementById('previewImg').src;
            }

            try {
                const res = await fetch('/api/forum', {
                    method: 'POST',
                    headers: { 'Authorization': token },
                    body: formData
                });

                if (res.ok) {
                    document.getElementById('postContent').value = '';
                    clearMedia();
                    loadPosts();
                    toast.success('Posted successfully');
                } else {
                    throw new Error("Failed");
                }
            } catch (err) {
                // Offline
                const newPost = {
                    id: Date.now(),
                    username: currentUser,
                    created_at: new Date().toISOString(),
                    content: content,
                    media_url: hasImage ? imgData : null,
                    media_type: hasImage ? 'image' : null,
                    likes: 0,
                    replies: 0
                };
                dummyFeed.unshift(newPost);
                document.getElementById('postContent').value = '';
                clearMedia();
                renderFeed(dummyFeed);
                toast.success('Posted (Offline Mode)');
            } finally {
                btn.innerHTML = ogText;
                btn.disabled = false;
            }
        };

        async function deletePost(id) {
            try {
                const res = await fetch(`/api/forum/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': token }
                });
                if (res.ok) {
                    loadPosts();
                    toast.success("Post deleted.");
                } else {
                    throw new Error();
                }
            } catch (e) {
                dummyFeed = dummyFeed.filter(p => p.id !== id);
                renderFeed(dummyFeed);
                toast.success("Post deleted (Offline Mode)");
            }
        }

        loadPosts();
    </script>
    <script src="js/mobile-nav.js"></script>
</body>

</html>
