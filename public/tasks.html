<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager | Farm Central</title>
    <meta name="description" content="Manage your daily farm chores, schedule tasks, and track completion.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7007280990614643" crossorigin="anonymous"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/premium-theme.css" rel="stylesheet">
    <style>
        body {
            background: #090e17;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding-bottom: 2rem;
        }

        h1,
        h2,
        h3,
        .brand-font {
            font-family: 'Outfit', sans-serif;
        }

        /* Abstract glowing orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.15;
            animation: float 15s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .orb-1 {
            width: 50vw;
            height: 50vw;
            background: #3b82f6;
            top: -10vh;
            right: -10vw;
            text-shadow: none;
            box-shadow: none;
        }

        .orb-2 {
            width: 40vw;
            height: 40vw;
            background: #8b5cf6;
            bottom: -20vh;
            left: -10vw;
            animation-delay: -5s;
            text-shadow: none;
            box-shadow: none;
        }

        /* Custom Scrollbar for tasks */
        #taskDisplay::-webkit-scrollbar {
            width: 6px;
        }

        #taskDisplay::-webkit-scrollbar-track {
            background: transparent;
        }

        #taskDisplay::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        #taskDisplay::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .task-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.4);
        }
    </style>
</head>

<body class="selection:bg-blue-500/30 selection:text-blue-200">
    <!-- Background Elements -->
    <div id="canvas-bg" class="fixed inset-0 z-[-2]"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 mt-12 md:mt-20 relative z-10 fade-in-up">

        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='dashboard.html'"
                    class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-white hover:bg-white/10 transition hover-lift shadow-lg">
                    🏠
                </button>
                <div>
                    <h1
                        class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400 tracking-tight brand-font flex items-center gap-3">
                        <img src="logo.png" alt="Logo" class="w-10 h-10 object-contain inline-block mr-1">
                        Farm Chores
                    </h1>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Daily Operations
                        Scheduler</p>
                </div>
            </div>
            <div
                class="hidden sm:flex bg-blue-500/10 border border-blue-500/20 px-4 py-2 rounded-xl text-blue-400 text-sm font-bold items-center gap-2 shadow-inner">
                <svg class="w-4 h-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span id="current-date-display">Today</span>
            </div>
        </header>

        <!-- Input Form -->
        <div
            class="glass-premium p-6 rounded-[2rem] border border-white/5 mb-8 shadow-xl relative overflow-hidden group">
            <!-- Decorative Glow -->
            <div
                class="absolute -right-10 -bottom-10 w-40 h-40 bg-blue-500/10 blur-[40px] rounded-full pointer-events-none group-hover:bg-blue-500/20 transition duration-500">
            </div>

            <form id="taskInput" class="flex flex-col md:flex-row gap-4 relative z-10">
                <div class="grid grid-cols-2 gap-4 md:w-auto flex-shrink-0">
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">📅</span>
                        <input type="date" id="tDate" required
                            class="w-full bg-black/40 text-sm text-white pl-9 pr-3 py-3.5 rounded-xl border border-white/10 outline-none focus:border-blue-500/50 shadow-inner cursor-pointer appearance-none">
                    </div>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">⏰</span>
                        <input type="time" id="tTime" required
                            class="w-full bg-black/40 text-sm text-white pl-9 pr-3 py-3.5 rounded-xl border border-white/10 outline-none focus:border-blue-500/50 shadow-inner cursor-pointer appearance-none">
                    </div>
                </div>

                <div class="flex-1 relative">
                    <input type="text" id="tDesc" placeholder="What needs to be done? (e.g., Irrigate Sector A)"
                        required
                        class="w-full bg-black/40 text-white px-4 py-3.5 rounded-xl border border-white/10 outline-none focus:border-blue-500/50 shadow-inner placeholder-slate-500 transition">
                </div>

                <button type="submit"
                    class="btn-premium bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-8 py-3.5 rounded-xl font-black uppercase tracking-widest shadow-lg shadow-blue-500/20 border border-blue-400/30 transition hover-scale flex items-center justify-center gap-2 flex-shrink-0">
                    <span>Add Task</span>
                    <span class="text-xl leading-none">+</span>
                </button>
            </form>
        </div>

        <!-- Task List -->
        <div class="glass-premium p-6 md:p-8 rounded-[2rem] border border-white/5 shadow-xl relative min-h-[50vh]">
            <div class="flex justify-between items-center mb-6 pb-4 border-b border-white/5">
                <h2 class="text-xl font-bold text-white brand-font flex items-center gap-2">
                    <span>📋</span> Upcoming Pending
                </h2>
                <div class="flex gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                    <span>Sort:</span>
                    <span class="text-blue-400 cursor-pointer">Date</span>
                </div>
            </div>

            <div id="taskDisplay" class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[50vh] overflow-y-auto pr-2 pb-4">
                <!-- Loading State -->
                <div class="col-span-full flex flex-col items-center justify-center h-full text-slate-500 gap-4">
                    <div class="w-8 h-8 border-4 border-slate-700 border-t-blue-500 rounded-full animate-spin"></div>
                    <span class="text-xs font-bold uppercase tracking-widest">Loading Chores...</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="js/toast.js"></script>
    <script>
        // --- APP LOGIC ---
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';

        // Set default date to today
        document.getElementById('tDate').valueAsDate = new Date();
        document.getElementById('current-date-display').innerText = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

        // Fallback fake tasks if API fails
        let fallbackTasks = [
            { id: 101, task_date: new Date().toISOString().split('T')[0], task_time: '08:00', description: 'Inspect irrigation main valve' },
            { id: 102, task_date: new Date().toISOString().split('T')[0], task_time: '14:30', description: 'Harvest early ripe tomatoes in greenhouse 2' },
            { id: 103, task_date: new Date(Date.now() + 86400000).toISOString().split('T')[0], task_time: '06:00', description: 'Apply organic pest deterrent to north field' }
        ];

        async function loadTasks() {
            try {
                const res = await fetch('/api/tasks', { headers: { 'Authorization': token } });
                if (!res.ok) throw new Error("API not available");
                const data = await res.json();
                renderTasks(data);
            } catch (e) {
                console.log("Using local fallback tasks");
                renderTasks(fallbackTasks);
            }
        }

        function renderTasks(data) {
            const display = document.getElementById('taskDisplay');

            if (!data || data.length === 0) {
                display.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center h-full text-slate-500 gap-3 opacity-60">
                        <div class="text-4xl mb-2">🎉</div>
                        <p class="text-sm font-bold uppercase tracking-widest">All caught up!</p>
                        <p class="text-xs">No pending chores for now.</p>
                    </div>`;
                return;
            }

            // Sort by date and time
            data.sort((a, b) => {
                const dA = new Date(`${a.task_date.split('T')[0]}T${a.task_time}`);
                const dB = new Date(`${b.task_date.split('T')[0]}T${b.task_time}`);
                return dA - dB;
            });

            display.innerHTML = data.map((t, index) => {
                const dateStr = t.task_date.split('T')[0];
                const isToday = dateStr === new Date().toISOString().split('T')[0];
                const delay = index * 0.05;

                return `
                <div class="task-card glass-premium p-5 rounded-2xl border border-white/5 relative group flex flex-col gap-2 overflow-hidden animate-[fade-in-up_0.4s_forwards] opacity-0" style="animation-delay: ${delay}s">
                    <div class="absolute left-0 top-0 bottom-0 w-1 ${isToday ? 'bg-blue-500' : 'bg-slate-600'}"></div>
                    
                    <button onclick="deleteTask(${t.id})" class="absolute top-4 right-4 w-8 h-8 rounded-xl bg-rose-500/10 text-rose-400 opacity-0 group-hover:opacity-100 hover:bg-rose-500 hover:text-white transition-all flex items-center justify-center border border-rose-500/20 shadow-sm" title="Mark Complete">
                       <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </button>
                    
                    <div class="flex items-center gap-2">
                        <span class="px-2 py-1 rounded bg-black/40 text-[10px] font-bold text-blue-300 border border-white/5 uppercase tracking-wider flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full ${isToday ? 'bg-blue-400 animate-pulse' : 'bg-slate-500'}"></span>
                            ${isToday ? 'TODAY' : dateStr}
                        </span>
                        <span class="text-xs text-slate-400 font-bold font-mono bg-white/5 px-2 py-1 rounded">${t.task_time}</span>
                    </div>
                    
                    <p class="text-slate-100 font-medium leading-snug mt-1 pr-8">${t.description}</p>
                </div>
            `}).join('');
        }

        async function deleteTask(id) {
            // Optimistic UI for local fallback
            const oldTasks = [...fallbackTasks];
            fallbackTasks = fallbackTasks.filter(t => t.id !== id);

            // Try API
            try {
                const res = await fetch(`/api/tasks/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': token }
                });
                if (res.ok) {
                    toast.success('Task marked as complete! 🌱');
                    loadTasks();
                } else {
                    throw new Error("Failed");
                }
            } catch (e) {
                // Network failed, rely on local state update we just did
                toast.success('Task completed (Offline logic) 🌱');
                renderTasks(fallbackTasks);
            }
        }

        document.getElementById('taskInput').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="animate-spin text-lg">⏳</span>';
            btn.disabled = true;

            const bodyData = {
                task_date: document.getElementById('tDate').value,
                task_time: document.getElementById('tTime').value,
                description: document.getElementById('tDesc').value
            };

            try {
                const res = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': token },
                    body: JSON.stringify(bodyData)
                });

                if (res.ok) {
                    document.getElementById('tDesc').value = '';
                    loadTasks();
                    toast.success('Task scheduled successfully.');
                } else {
                    throw new Error();
                }
            } catch (err) {
                // Fallback local logic
                bodyData.id = Date.now();
                fallbackTasks.push(bodyData);
                document.getElementById('tDesc').value = '';
                renderTasks(fallbackTasks);
                toast.success('Task added locally.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        loadTasks();
    </script>
    <script src="js/mobile-nav.js"></script>
</body>

</html>
