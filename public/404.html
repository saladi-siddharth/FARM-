<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Lost in the Fields | Farm Central</title>
    <meta name="description" content="Page not found — Farm Central">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7007280990614643" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #090e17;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-font { font-family: 'Outfit', sans-serif; }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.12;
            animation: float 15s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .orb-1 { width: 50vw; height: 50vw; background: #ef4444; top: -10vh; right: -10vw; }
        .orb-2 { width: 40vw; height: 40vw; background: #f59e0b; bottom: -20vh; left: -10vw; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-30px) rotate(3deg); }
        }

        @keyframes glitch {
            0%, 100% { text-shadow: -2px 0 #ef4444, 2px 0 #3b82f6; }
            25% { text-shadow: 2px 0 #ef4444, -2px 0 #3b82f6; }
            50% { text-shadow: -1px 2px #ef4444, 1px -2px #3b82f6; }
            75% { text-shadow: 1px -1px #ef4444, -1px 1px #3b82f6; }
        }

        .glitch-text {
            animation: glitch 2s ease-in-out infinite;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-up { animation: fadeInUp 0.8s ease forwards; }
        .fade-up-2 { animation: fadeInUp 0.8s 0.15s ease forwards; opacity: 0; }
        .fade-up-3 { animation: fadeInUp 0.8s 0.3s ease forwards; opacity: 0; }
        .fade-up-4 { animation: fadeInUp 0.8s 0.45s ease forwards; opacity: 0; }

        .tractor-bounce {
            animation: tractorBounce 2s ease-in-out infinite;
        }

        @keyframes tractorBounce {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }
    </style>
</head>

<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="relative z-10 text-center px-6 max-w-lg">
        <!-- Animated Tractor -->
        <div class="text-7xl md:text-8xl tractor-bounce mb-6 fade-up">🚜</div>

        <!-- 404 Number -->
        <h1 class="text-8xl md:text-9xl font-black brand-font glitch-text fade-up-2"
            style="background: linear-gradient(135deg, #ef4444, #f59e0b, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -4px;">
            404
        </h1>

        <!-- Message -->
        <h2 class="text-xl md:text-2xl font-bold text-slate-200 mt-4 brand-font fade-up-3">
            Lost in the fields!
        </h2>
        <p class="text-slate-400 mt-3 text-sm md:text-base leading-relaxed fade-up-3">
            This page wandered off the farm. Don't worry — let's get you back to familiar ground.
        </p>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 mt-10 justify-center fade-up-4">
            <a href="dashboard.html"
                class="px-8 py-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 rounded-2xl font-black text-white uppercase tracking-widest text-sm shadow-lg shadow-emerald-500/20 border border-emerald-400/30 transition hover:scale-105">
                🏠 Go to Dashboard
            </a>
            <a href="index.html"
                class="px-8 py-4 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 rounded-2xl font-bold text-slate-300 hover:text-white text-sm transition hover:scale-105">
                ← Back to Home
            </a>
        </div>

        <!-- Hint -->
        <div class="mt-12 fade-up-4">
            <p class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">
                Press <kbd class="px-2 py-0.5 bg-white/5 border border-white/10 rounded text-slate-400 mx-1 font-mono">Ctrl + K</kbd> to search anything
            </p>
        </div>
    </div>

    <script src="js/command-palette.js"></script>
</body>

</html>
