<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispute Resolution Center | Trade Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; }
    </style>
</head>

<body class="selection:bg-indigo-200 selection:text-indigo-900 pb-20">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="w-10 h-10 rounded-xl bg-slate-50 border border-slate-200 text-slate-500 hover:bg-slate-100 transition">←</button>
            <h1 class="text-xl font-black text-slate-800">Dispute Center</h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-10">
        
        <div class="bg-rose-50 border border-rose-200 rounded-2xl p-6 mb-8 flex items-start gap-4">
            <div class="text-3xl">⚖️</div>
            <div>
                <h3 class="font-bold text-rose-800">Report an Issue</h3>
                <p class="text-sm text-rose-700 mt-1">If there is an issue with your order (e.g. goods not received, quality mismatch), you can file a dispute. Funds in escrow will be frozen until resolution.</p>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm mb-10">
            <h2 class="font-bold text-slate-800 mb-6 text-lg border-b border-slate-100 pb-4">File a New Dispute</h2>
            <form id="dispute-form" onsubmit="submitDispute(event)">
                <div class="mb-5">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Transaction ID</label>
                    <input type="text" id="txn-id" required placeholder="e.g. 45" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-100 outline-none transition">
                </div>
                <div class="mb-5">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Reason</label>
                    <select id="reason" required class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-100 outline-none transition">
                        <option value="not_received">Goods not received</option>
                        <option value="quality_mismatch">Quality mismatch</option>
                        <option value="quantity_shortage">Quantity shortage</option>
                        <option value="delayed">Delivery delayed</option>
                        <option value="wrong_product">Wrong product delivered</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Detailed Description</label>
                    <textarea id="description" required rows="4" placeholder="Describe the issue in detail..." class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-100 outline-none transition resize-none"></textarea>
                </div>
                <button type="submit" id="submitBtn" class="w-full py-3.5 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-xl transition shadow-lg shadow-rose-500/20">Submit Dispute</button>
            </form>
        </div>

        <h2 class="font-bold text-slate-800 mb-4 text-lg">My Active Disputes</h2>
        <div id="disputes-list" class="space-y-4">
            <p class="text-center text-sm text-slate-400 py-6">Loading disputes...</p>
        </div>

    </main>

    <script src="js/toast.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) location.href = 'login.html';

        async function loadDisputes() {
            try {
                const res = await fetch('/api/disputes/my', { headers: { 'Authorization': token } });
                if(res.ok) {
                    const data = await res.json();
                    renderDisputes(data);
                }
            } catch(e) {
                document.getElementById('disputes-list').innerHTML = '<p class="text-center text-sm text-slate-400 py-6">Error loading disputes</p>';
            }
        }

        function renderDisputes(disputes) {
            const list = document.getElementById('disputes-list');
            if(disputes.length === 0) {
                list.innerHTML = '<div class="bg-white border border-slate-200 rounded-2xl p-8 text-center text-slate-400"><p class="font-medium">No disputes found</p></div>';
                return;
            }
            list.innerHTML = disputes.map(d => `
                <div class="bg-white border border-slate-200 rounded-2xl p-5 hover:border-slate-300 transition shadow-sm">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-xs font-bold text-slate-400">TXN #${d.transaction_id}</span>
                            <h4 class="font-bold text-slate-800 text-lg">${d.crop_name || 'Order Issue'}</h4>
                        </div>
                        <span class="px-3 py-1 bg-amber-50 text-amber-600 text-xs font-bold rounded-lg border border-amber-100 uppercase tracking-wide">${d.status || 'Under Review'}</span>
                    </div>
                    <p class="text-sm font-bold text-rose-600 mb-2">Reason: <span class="font-medium text-slate-700">${d.reason}</span></p>
                    <p class="text-sm text-slate-500 line-clamp-2">${d.description}</p>
                    <p class="text-xs text-slate-400 mt-4 font-medium">${new Date(d.created_at).toLocaleString()}</p>
                </div>
            `).join('');
        }

        async function submitDispute(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '⏳ Submitting...'; btn.disabled = true;

            const payload = {
                reason: document.getElementById('reason').value,
                description: document.getElementById('description').value
            };
            const txnId = document.getElementById('txn-id').value;

            try {
                const res = await fetch(`/api/disputes/${txnId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': token },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(res.ok) {
                    toast.success('Dispute filed successfully.');
                    document.getElementById('dispute-form').reset();
                    loadDisputes();
                } else {
                    toast.error(data.error || 'Failed to file dispute');
                }
            } catch(err) {
                toast.error('Network error');
            }
            btn.innerHTML = 'Submit Dispute'; btn.disabled = false;
        }

        loadDisputes();
    </script>
</body>
</html>
