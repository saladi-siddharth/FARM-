<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnings & Payouts | Farm Central</title>
    <meta name="description" content="Track your farming earnings, escrow balance, and request payouts.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7007280990614643" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/premium-theme.css" rel="stylesheet">
    <style>
        body { background:#090e17; color:#f8fafc; font-family:'Inter',sans-serif; overflow-x:hidden; margin:0; }
        h1,h2,h3,.brand-font { font-family:'Outfit',sans-serif; }
        .bg-orb { position:fixed; border-radius:50%; filter:blur(120px); z-index:-1; opacity:0.15; animation:float 15s ease-in-out infinite alternate; pointer-events:none; }
        .orb-1 { width:50vw; height:50vw; background:#10b981; top:-10vh; right:-10vw; }
        .orb-2 { width:40vw; height:40vw; background:#6366f1; bottom:-20vh; left:-10vw; animation-delay:-5s; }
        tbody tr { transition:all 0.2s ease; }
        tbody tr:hover { background:rgba(255,255,255,0.03); transform:scale(1.005); }
    </style>
</head>
<body class="selection:bg-emerald-500/30 selection:text-emerald-200">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 mt-12 md:mt-20 relative z-10 fade-in-up pb-20">

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-white hover:bg-white/10 transition hover-lift shadow-lg">←</button>
                <div>
                    <h1 class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 tracking-tight brand-font">Earnings & Payouts</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Escrow-Protected Wallet</p>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="window.location.href='trading.html'" class="btn-premium px-5 py-2.5 rounded-xl bg-white/5 hover:bg-white/10 transition font-bold text-slate-300 text-sm border border-white/10 flex items-center gap-2 shadow-md">🤝 Trade Hub</button>
                <button onclick="window.location.href='dashboard.html'" class="btn-premium px-5 py-2.5 rounded-xl bg-white/5 hover:bg-white/10 transition font-bold text-slate-300 text-sm border border-white/10 flex items-center gap-2 shadow-md">🏠 <span class="hidden sm:inline">Dashboard</span></button>
            </div>
        </header>

        <!-- Balance Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-10">
            <div class="glass-premium p-6 md:p-8 rounded-[2rem] border border-white/5 shadow-2xl relative overflow-hidden group">
                <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-emerald-500/10 blur-[50px] rounded-full pointer-events-none group-hover:bg-emerald-500/20 transition duration-500"></div>
                <div class="relative z-10">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_#10b981]"></span> Available Balance
                    </p>
                    <h2 class="text-5xl font-black text-emerald-400 mb-4 tracking-tighter drop-shadow-[0_0_10px_rgba(16,185,129,0.3)]" id="wallet-balance">₹0.00</h2>
                    <p class="text-xs text-slate-500 font-medium leading-relaxed mb-6">Funds released from escrow after delivery confirmation.</p>
                    <button onclick="requestPayout()" class="btn-premium w-full py-3.5 bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 text-white font-black rounded-xl transition shadow-lg shadow-emerald-500/20 border border-emerald-400/50 uppercase tracking-widest text-sm">💸 Request Payout</button>
                </div>
            </div>

            <div class="glass-premium p-6 md:p-8 rounded-[2rem] border border-indigo-500/20 shadow-2xl relative overflow-hidden group">
                <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-indigo-500/10 blur-[50px] rounded-full pointer-events-none group-hover:bg-indigo-500/20 transition duration-500"></div>
                <div class="relative z-10">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse shadow-[0_0_8px_#6366f1]"></span> Escrow Hold
                    </p>
                    <h2 class="text-5xl font-black text-indigo-400 mb-4 tracking-tighter drop-shadow-[0_0_10px_rgba(99,102,241,0.3)]" id="escrow-balance">₹0.00</h2>
                    <p class="text-xs text-slate-500 font-medium leading-relaxed mb-6">Funds held in escrow. Released when buyer confirms delivery.</p>
                    <div class="w-full py-3.5 bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 font-bold rounded-xl text-sm text-center uppercase tracking-widest">🔒 Secured by Platform</div>
                </div>
            </div>
        </div>

        <!-- Payout History -->
        <div class="glass-premium rounded-[2rem] border border-white/5 shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-black/20">
                <h2 class="text-xl font-bold text-white brand-font flex items-center gap-2"><span>💰</span> Payout History</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left whitespace-nowrap">
                    <thead class="bg-black/40 text-slate-400 text-[10px] font-black uppercase tracking-widest sticky top-0 backdrop-blur-md">
                        <tr>
                            <th class="px-6 py-4 border-b border-white/5">Date</th>
                            <th class="px-6 py-4 border-b border-white/5">Amount</th>
                            <th class="px-6 py-4 border-b border-white/5">Status</th>
                        </tr>
                    </thead>
                    <tbody id="payouts-table" class="divide-y divide-white/5 font-medium text-sm">
                        <tr><td colspan="3" class="p-16 text-center"><div class="w-8 h-8 border-4 border-slate-700 border-t-emerald-500 rounded-full animate-spin mx-auto mb-4"></div><span class="text-xs font-bold uppercase tracking-widest text-slate-500">Loading history...</span></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/toast.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) location.href = 'login.html';

        async function loadWallet() {
            try {
                const res = await fetch('/api/auth/me', { headers: { 'Authorization': token } });
                if(res.ok) {
                    const data = await res.json();
                    document.getElementById('wallet-balance').innerText = `₹${Number(data.wallet_balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                }
            } catch(e) {}
        }

        async function loadPayouts() {
            try {
                const res = await fetch('/api/payouts/my', { headers: { 'Authorization': token } });
                if(res.ok) renderPayouts(await res.json());
            } catch(e) {
                document.getElementById('payouts-table').innerHTML = '<tr><td colspan="3" class="px-6 py-12 text-center text-sm text-slate-500">Error loading history</td></tr>';
            }
        }

        function renderPayouts(payouts) {
            const tbody = document.getElementById('payouts-table');
            if(!payouts.length) {
                tbody.innerHTML = `<tr><td colspan="3" class="p-16 text-center text-slate-500">
                    <div class="text-4xl mb-3 opacity-50">💸</div>
                    <p class="font-bold text-sm text-slate-400">No payout requests yet</p>
                    <p class="text-xs mt-1 uppercase tracking-widest">Request your first payout above.</p>
                </td></tr>`;
                return;
            }
            tbody.innerHTML = payouts.map((p, i) => {
                const sc = {
                    'pending': 'bg-amber-500/10 text-amber-400 border-amber-500/20',
                    'completed': 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20',
                    'rejected': 'bg-rose-500/10 text-rose-400 border-rose-500/20'
                };
                return `
                <tr class="group text-slate-200" style="animation:fadeInUp 0.4s ${i*0.05}s forwards; opacity:0">
                    <td class="px-6 py-5 font-mono text-xs text-slate-400">${new Date(p.created_at).toLocaleDateString()}</td>
                    <td class="px-6 py-5 text-lg font-black text-emerald-400">₹${Number(p.amount).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td class="px-6 py-5"><span class="px-3 py-1 rounded-lg text-[10px] font-black border uppercase tracking-wider ${sc[p.status] || sc.pending}">${p.status}</span></td>
                </tr>`;
            }).join('');
        }

        async function requestPayout() {
            const amount = prompt("Enter amount to withdraw (₹):");
            if(!amount || isNaN(amount) || amount <= 0) return;
            try {
                const res = await fetch('/api/payouts/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': token },
                    body: JSON.stringify({ amount: parseFloat(amount) })
                });
                const data = await res.json();
                if(res.ok) { toast.success('Payout requested!'); loadWallet(); loadPayouts(); }
                else toast.error(data.error || 'Failed');
            } catch(e) { toast.error('Network error'); }
        }

        loadWallet();
        loadPayouts();
    </script>
    <script src="js/mobile-nav.js"></script>
</body>
</html>
