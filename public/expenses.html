<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Tracker | Farm Central</title>
    <meta name="description" content="Financial Tracker — Monitor your farm's cash outflow">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/premium-theme.css" rel="stylesheet">
    <style>
        body {
            background: #090e17;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding-bottom: 2rem;
        }

        h1,
        h2,
        h3,
        .brand-font {
            font-family: 'Outfit', sans-serif;
        }

        /* Abstract glowing orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.15;
            animation: float 15s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .orb-1 {
            width: 50vw;
            height: 50vw;
            background: #f59e0b;
            top: -10vh;
            right: -10vw;
        }

        .orb-2 {
            width: 40vw;
            height: 40vw;
            background: #10b981;
            bottom: -20vh;
            left: -10vw;
            animation-delay: -5s;
        }

        /* Custom Scrollbar for list */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* inputs override */
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.2em 1.2em;
            padding-right: 2.5rem;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        /* Table Row hover logic */
        tbody tr {
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: scale(1.005);
        }
    </style>
</head>

<body class="selection:bg-amber-500/30 selection:text-amber-200">
    <!-- Background Elements -->
    <div id="canvas-bg" class="fixed inset-0 z-[-2]"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-12 md:mt-20 relative z-10 fade-in-up">

        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()"
                    class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-white hover:bg-white/10 transition hover-lift shadow-lg">
                    ←
                </button>
                <div>
                    <h1
                        class="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 tracking-tight brand-font flex items-center gap-3">
                        Financial Tracker
                    </h1>
                    <p class="text-[10px] md:text-md text-slate-400 font-bold uppercase tracking-widest mt-1">Monitor
                        your farm's cash outflow</p>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="window.location.href='dashboard.html'"
                    class="btn-premium px-5 py-2.5 rounded-xl bg-white/5 hover:bg-white/10 transition font-bold text-slate-300 text-sm border border-white/10 flex items-center justify-center gap-2 shadow-md">
                    🏠 <span class="hidden sm:inline">Dashboard</span>
                </button>
                <button onclick="exportCSV()"
                    class="w-full md:w-auto btn-premium bg-white/5 hover:bg-white/10 text-white px-6 py-3.5 rounded-xl font-bold transition flex items-center justify-center gap-2 shadow-lg border border-white/10 hover-scale focus:ring-2 focus:ring-amber-500/50">
                    <span>📊 Export Data</span>
                </button>
            </div>
        </header>

        <!-- Main Form -->
        <div
            class="glass-premium p-6 md:p-8 rounded-[2rem] border border-white/5 mb-8 shadow-2xl relative overflow-hidden group">
            <!-- Decorative Glow -->
            <div
                class="absolute -right-20 -bottom-20 w-64 h-64 bg-amber-500/10 blur-[80px] rounded-full pointer-events-none group-hover:bg-amber-500/20 transition duration-500">
            </div>

            <h2 class="text-xl font-bold text-white brand-font mb-6 flex items-center gap-2 relative z-10">
                <span
                    class="p-1.5 bg-amber-500/20 rounded-lg text-amber-500 border border-amber-500/30 text-sm">💰</span>
                Log New Expense
            </h2>

            <form id="expForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 relative z-10">
                <!-- Category -->
                <div class="flex flex-col lg:col-span-1">
                    <label
                        class="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest pl-1">Category</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🏷️</span>
                        <select id="category"
                            class="w-full pl-9 pr-3 py-3.5 bg-black/40 text-slate-200 rounded-xl border border-white/10 outline-none focus:border-amber-500/50 shadow-inner text-sm font-medium transition cursor-pointer">
                            <option value="Seeds">Seeds</option>
                            <option value="Fertilizer">Fertilizer</option>
                            <option value="Labor">Labor</option>
                            <option value="Equipment">Equipment</option>
                            <option value="Fuel">Fuel</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <!-- Amount -->
                <div class="flex flex-col lg:col-span-1">
                    <label
                        class="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest pl-1">Amount</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold">₹</span>
                        <input type="number" id="amount" placeholder="0.00" required step="0.01" min="0"
                            class="w-full pl-8 pr-3 py-3.5 bg-black/40 text-white rounded-xl border border-white/10 outline-none focus:border-amber-500/50 shadow-inner placeholder-slate-600 font-medium transition">
                    </div>
                </div>

                <!-- Date -->
                <div class="flex flex-col lg:col-span-1">
                    <label
                        class="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest pl-1">Date</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">📅</span>
                        <input type="date" id="date" required
                            class="w-full pl-9 pr-3 py-3.5 bg-black/40 text-white rounded-xl border border-white/10 outline-none focus:border-amber-500/50 shadow-inner font-medium transition cursor-pointer appearance-none text-sm">
                    </div>
                </div>

                <!-- Description & Submit -->
                <div class="flex flex-col lg:col-span-2">
                    <label
                        class="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest pl-1">Description</label>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <div class="relative flex-1">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">📝</span>
                            <input type="text" id="desc" placeholder="Details (e.g., Tractor Fuel)" required
                                class="w-full pl-9 pr-3 py-3.5 bg-black/40 text-white rounded-xl border border-white/10 outline-none focus:border-amber-500/50 shadow-inner placeholder-slate-600 font-medium transition">
                        </div>
                        <button type="submit" id="addBtn"
                            class="btn-premium bg-gradient-to-br from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white px-8 py-3.5 rounded-xl font-black uppercase tracking-widest transition shadow-lg shadow-amber-500/20 border border-amber-400/50 flex-shrink-0 hover-scale">
                            Add Entry
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Expense Table -->
        <div
            class="glass-premium rounded-[2rem] border border-white/5 shadow-2xl overflow-hidden flex flex-col min-h-[500px]">

            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-black/20">
                <h2 class="text-xl font-bold text-white brand-font flex items-center gap-2">
                    <span>🧾</span> Recent Outflows
                </h2>
                <!-- Optional Sum view could go here -->
                <div class="hidden sm:flex text-right flex-col">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Monitored</p>
                    <p class="text-xl font-black text-amber-400" id="total-sum">₹0.00</p>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left whitespace-nowrap">
                    <thead
                        class="bg-black/40 text-slate-400 text-[10px] font-black uppercase tracking-widest sticky top-0 backdrop-blur-md">
                        <tr>
                            <th class="px-6 py-4 rounded-tl-xl border-b border-white/5">Date</th>
                            <th class="px-6 py-4 border-b border-white/5">Category</th>
                            <th class="px-6 py-4 border-b border-white/5">Notes</th>
                            <th class="px-6 py-4 border-b border-white/5 text-right w-1/4 rounded-tr-xl">Amount (₹)</th>
                        </tr>
                    </thead>
                    <tbody id="expenseBody" class="divide-y divide-white/5 font-medium text-sm">
                        <!-- Loaded via JS -->
                        <tr>
                            <td colspan="4" class="p-20 text-center">
                                <div
                                    class="w-8 h-8 border-4 border-slate-700 border-t-amber-500 rounded-full animate-spin mx-auto mb-4">
                                </div>
                                <span class="text-xs font-bold uppercase tracking-widest text-slate-500">Syncing
                                    Ledgers...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/toast.js"></script>
    <script>
        // --- LOGIC ---
        const token = localStorage.getItem('token');
        const expForm = document.getElementById('expForm');
        const expenseBody = document.getElementById('expenseBody');

        // Defaults
        document.getElementById('date').valueAsDate = new Date();

        // Security Check
        if (!token) window.location.href = 'index.html';

        let localExpenses = [
            { id: 1, expense_date: new Date().toISOString().split('T')[0], category: 'Seeds', description: 'Hybird Corn Seeds 50kg', amount: 4500.50 },
            { id: 2, expense_date: new Date(Date.now() - 86400000).toISOString().split('T')[0], category: 'Fuel', description: 'Diesel for Tractor', amount: 2300.00 }
        ];

        // Load Expenses from Database
        async function loadExpenses() {
            try {
                const res = await fetch('/api/expenses', {
                    headers: { 'Authorization': token }
                });
                if (!res.ok) throw new Error("Offline");
                const data = await res.json();
                renderExpenses(data);
            } catch (err) {
                console.log("Using fallback memory");
                renderExpenses(localExpenses);
            }
        }

        function renderExpenses(data) {
            if (!data || data.length === 0) {
                expenseBody.innerHTML = `
                 <tr>
                    <td colspan="4" class="p-16 text-center text-slate-500">
                         <div class="text-4xl mb-3 opacity-50">🍃</div>
                         <p class="font-bold text-sm text-slate-400">No expenses recorded yet.</p>
                         <p class="text-xs mt-1 uppercase tracking-widest">Your ledger is clean.</p>
                    </td>
                 </tr>`;
                document.getElementById('total-sum').innerText = '₹0.00';
                return;
            }

            // Calculate Total
            const total = data.reduce((sum, item) => sum + parseFloat(item.amount), 0);
            document.getElementById('total-sum').innerText = `₹${total.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

            // Sort by date desc
            data.sort((a, b) => new Date(b.expense_date) - new Date(a.expense_date));

            expenseBody.innerHTML = data.map((e, index) => {
                const delay = index * 0.05;

                // Category Color logic
                let tagClass = "bg-slate-500/10 text-slate-400 border border-slate-500/20";
                if (e.category === 'Seeds') tagClass = "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                else if (e.category === 'Fuel') tagClass = "bg-orange-500/10 text-orange-400 border border-orange-500/20";
                else if (e.category === 'Fertilizer') tagClass = "bg-purple-500/10 text-purple-400 border border-purple-500/20";
                else if (e.category === 'Equipment') tagClass = "bg-blue-500/10 text-blue-400 border border-blue-500/20";
                else if (e.category === 'Labor') tagClass = "bg-pink-500/10 text-pink-400 border border-pink-500/20";

                return `
                 <tr class="group text-slate-200 animate-[fade-in-up_0.4s_forwards] opacity-0" style="animation-delay: ${delay}s">
                     <td class="px-6 py-5 font-mono text-xs text-slate-400">${e.expense_date.split('T')[0]}</td>
                     <td class="px-6 py-5">
                        <span class="${tagClass} px-3 py-1 rounded text-[10px] font-black uppercase tracking-widest shadow-inner">${e.category}</span>
                     </td>
                     <td class="px-6 py-5 text-slate-300 font-medium whitespace-normal max-w-xs truncate" title="${e.description || ''}">${e.description || '<span class="text-slate-600 italic">No notes</span>'}</td>
                     <td class="px-6 py-5 text-right font-black text-lg text-amber-400 flex items-center justify-end gap-4 h-full">
                         ₹${parseFloat(e.amount).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                         <button onclick="deleteExpense(${e.id})" class="opacity-0 group-hover:opacity-100 text-rose-500 hover:text-white hover:bg-rose-500 p-2 rounded-xl transition shadow-sm border border-transparent hover:border-rose-400 relative z-10" title="Delete record">
                             <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                         </button>
                     </td>
                 </tr>
             `}).join('');
        }

        async function deleteExpense(id) {
            localExpenses = localExpenses.filter(i => i.id !== id);

            try {
                const res = await fetch(`/api/expenses/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': token }
                });
                if (res.ok) {
                    loadExpenses();
                    toast.success('Record deleted.');
                } else {
                    throw new Error();
                }
            } catch (e) {
                renderExpenses(localExpenses);
                toast.success('Record deleted locally.');
            }
        }

        // Add New Expense
        expForm.onsubmit = async (e) => {
            e.preventDefault();

            const btn = document.getElementById('addBtn');
            const ogText = btn.innerHTML;
            btn.innerHTML = '<span class="animate-spin text-lg">⏳</span>';
            btn.disabled = true;

            const payload = {
                category: document.getElementById('category').value,
                amount: document.getElementById('amount').value,
                expense_date: document.getElementById('date').value,
                description: document.getElementById('desc').value
            };

            try {
                const res = await fetch('/api/expenses', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    expForm.reset();
                    document.getElementById('date').valueAsDate = new Date();
                    loadExpenses();
                    toast.success('Expense recorded successfully.');
                } else {
                    throw new Error('Failed to save');
                }
            } catch (err) {
                payload.id = Date.now();
                localExpenses.push(payload);
                expForm.reset();
                document.getElementById('date').valueAsDate = new Date();
                renderExpenses(localExpenses);
                toast.success('Saved to local ledger.');
            } finally {
                btn.innerHTML = ogText;
                btn.disabled = false;
            }
        };

        // Initialize
        loadExpenses();

        async function exportCSV() {
            try {
                let dataToExport = localExpenses;
                try {
                    const res = await fetch('/api/expenses', { headers: { 'Authorization': token } });
                    if (res.ok) dataToExport = await res.json();
                } catch (e) { }

                if (!dataToExport || !dataToExport.length) return toast.warning('No data to export.');

                const csvContent = "data:text/csv;charset=utf-8,"
                    + "ID,Date,Category,Description,Amount\n"
                    + dataToExport.map(e => `${e.id},${e.expense_date.split('T')[0]},${e.category},"${e.description || ""}",${e.amount}`).join("\n");

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `farm_expenses_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                link.remove();

                toast.success("CSV Downloaded!");
            } catch (e) {
                toast.error("Export failed.");
                console.error(e);
            }
        }
    </script>
    <script src="js/mobile-nav.js"></script>
</body>

</html>
