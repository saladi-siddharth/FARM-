<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Calendar | Farm Central</title>
    <meta name="description" content="Crop Calendar — Plan planting and harvesting seasons">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7007280990614643" crossorigin="anonymous"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <link href="css/premium-theme.css" rel="stylesheet">
    <style>
        body {
            background: #090e17;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        h1,
        h2,
        h3,
        .brand-font {
            font-family: 'Outfit', sans-serif;
        }

        /* Abstract glowing orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.15;
            animation: float 15s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .orb-1 {
            width: 50vw;
            height: 50vw;
            background: #10b981;
            top: -10vh;
            right: -10vw;
        }

        .orb-2 {
            width: 40vw;
            height: 40vw;
            background: #06b6d4;
            bottom: -20vh;
            left: -10vw;
            animation-delay: -5s;
        }

        /* Full Calendar Customization for Dark Theme */
        .fc-theme-standard td,
        .fc-theme-standard th,
        .fc-theme-standard .fc-scrollgrid {
            border-color: rgba(255, 255, 255, 0.05) !important;
        }

        .fc .fc-toolbar-title {
            font-size: 1.5rem !important;
            font-weight: 900;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            letter-spacing: -0.025em;
        }

        .fc-button {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #e2e8f0 !important;
            text-transform: capitalize !important;
            font-weight: 600 !important;
            border-radius: 8px !important;
            transition: all 0.2s !important;
            padding: 0.4rem 1rem !important;
            font-family: 'Inter', sans-serif !important;
        }

        .fc-button:hover {
            background: rgba(255, 255, 255, 0.1) !important;
        }

        .fc-button-active {
            background: rgba(16, 185, 129, 0.2) !important;
            color: #34d399 !important;
            border-color: rgba(16, 185, 129, 0.5) !important;
        }

        .fc-day-today {
            background-color: rgba(16, 185, 129, 0.05) !important;
        }

        .fc-col-header-cell-cushion {
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 0.75rem 0 !important;
        }

        .fc-daygrid-day-number {
            color: #cbd5e1;
            font-weight: 600;
            padding: 0.5rem !important;
        }

        .fc-event {
            border: none !important;
            border-radius: 6px !important;
            padding: 2px 4px !important;
            font-size: 0.75rem !important;
            font-weight: 600 !important;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2) !important;
            transition: transform 0.2s !important;
            cursor: pointer;
        }

        .fc-event:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .fc .fc-view-harness {
            min-height: 500px;
        }

        /* Modal Dialog Customization */
        dialog::backdrop {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }

        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.2em 1.2em;
            padding-right: 2.5rem;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
    </style>
</head>

<body class="selection:bg-emerald-500/30 selection:text-emerald-200">
    <!-- Background Elements -->
    <div id="canvas-bg" class="fixed inset-0 z-[-2]"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="max-w-7xl mx-auto h-screen flex flex-col p-4 md:p-8 pt-20 md:pt-12 fade-in-up relative z-10">

        <!-- Header -->
        <header class="flex justify-between items-center mb-8 shrink-0 relative">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()"
                    class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-white hover:bg-white/10 transition hover-lift shadow-lg">
                    ←
                </button>
                <div>
                    <h1
                        class="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 tracking-tight brand-font flex items-center gap-3">
                        Crop Calendar
                    </h1>
                    <p class="text-[10px] md:text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Plan
                        planting and harvesting seasons</p>
                </div>
            </div>

            <button
                onclick="document.getElementById('evtStart').value = new Date().toISOString().split('T')[0]; document.getElementById('eventModal').showModal();"
                class="hidden sm:flex btn-premium bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white px-6 py-3.5 rounded-xl font-bold transition flex items-center gap-2 shadow-lg shadow-emerald-500/20 border border-emerald-400/50 hover-scale">
                <span>➕ New Event</span>
            </button>
        </header>

        <!-- Main Calendar Container -->
        <div
            class="glass-premium flex-1 rounded-[2rem] p-4 md:p-8 overflow-hidden shadow-2xl relative border border-white/5 flex flex-col group hover:border-emerald-500/20 transition-colors duration-500">
            <!-- Decorative Glow -->
            <div
                class="absolute -left-20 -top-20 w-64 h-64 bg-emerald-500/10 blur-[80px] rounded-full pointer-events-none group-hover:bg-emerald-500/20 transition duration-500">
            </div>

            <div id='calendar' class="h-full flex-1 w-full relative z-10"></div>

            <!-- Mobile Add Button (Floating) -->
            <button
                onclick="document.getElementById('evtStart').value = new Date().toISOString().split('T')[0]; document.getElementById('eventModal').showModal();"
                class="sm:hidden absolute bottom-6 right-6 w-14 h-14 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-full flex items-center justify-center text-2xl text-white shadow-[0_0_20px_rgba(16,185,129,0.4)] border border-emerald-400/50 z-20">
                +
            </button>
        </div>
    </div>

    <!-- Smart Event Modal -->
    <dialog id="eventModal"
        class="glass-premium rounded-[2rem] p-0 border border-white/10 shadow-2xl text-white max-w-md w-full m-auto overflow-hidden">

        <div
            class="h-20 bg-gradient-to-tr from-emerald-900/50 to-slate-900/50 relative border-b border-white/5 flex items-center px-6">
            <div class="absolute inset-0 opacity-20"
                style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 20px 20px;"></div>
            <h3 class="text-xl font-black text-white brand-font tracking-wide relative z-10 flex items-center gap-2">
                <span class="p-1.5 bg-emerald-500/20 rounded-lg border border-emerald-500/30 text-emerald-400">📅</span>
                New Farm Event
            </h3>
            <button type="button" onclick="eventModal.close()"
                class="absolute top-6 right-6 text-slate-400 hover:text-white transition z-10">✕</button>
        </div>

        <form class="p-6 md:p-8 flex flex-col gap-6" onsubmit="saveEvent(event)">

            <!-- Crop Helper -->
            <div class="space-y-3">
                <label
                    class="text-[10px] text-slate-400 uppercase tracking-widest font-black flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    Smart Crop Assistant
                </label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                    <input list="cropValues" id="cropInput" placeholder="Type crop name (e.g. Rice)..."
                        class="w-full pl-9 pr-3 py-3.5 rounded-xl bg-black/40 border border-white/10 outline-none text-white focus:border-emerald-500/50 transition shadow-inner placeholder-slate-500 text-sm font-medium"
                        oninput="fetchCropDetails(this.value)">
                    <datalist id="cropValues">
                        <option value="Rice">
                        <option value="Wheat">
                        <option value="Corn">
                        <option value="Maize">
                        <option value="Cotton">
                        <option value="Tomato">
                        <option value="Potato">
                        <option value="Sugarcane">
                        <option value="Onion">
                        <option value="Soybean">
                    </datalist>
                </div>

                <!-- Details Box -->
                <div id="cropDetailsPanel"
                    class="hidden p-4 bg-emerald-500/5 rounded-xl border border-emerald-500/10 text-sm transition-all shadow-inner">
                    <div class="flex justify-between items-center mb-3">
                        <span class="font-bold text-emerald-400" id="cdName">Crop Name</span>
                        <span
                            class="px-2 py-0.5 bg-emerald-500/20 text-emerald-300 text-[10px] font-black tracking-widest uppercase rounded border border-emerald-500/30"
                            id="cdSeason">Season</span>
                    </div>
                    <div
                        class="grid grid-cols-2 gap-3 text-xs text-slate-300 font-medium bg-black/20 p-3 rounded-lg border border-white/5">
                        <div class="flex items-center gap-2"><span>⏱</span> <span id="cdDuration">--</span></div>
                        <div class="flex items-center gap-2"><span>💧</span> <span id="cdWater">--</span></div>
                        <div class="flex items-center gap-2"><span>🌡</span> <span id="cdTemp">--</span></div>
                        <div class="flex items-center gap-2"><span>🌱</span> <span id="cdSoil">--</span></div>
                    </div>
                    <div class="mt-3 text-[11px] text-emerald-200/70 font-medium leading-relaxed" id="cdTips"></div>
                </div>
            </div>

            <div class="h-px bg-white/10 w-full my-2"></div>

            <div class="space-y-4">
                <label class="text-[10px] text-slate-400 uppercase tracking-widest font-black">Event Details</label>

                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">📝</span>
                    <input type="text" id="evtTitle" placeholder="Event Title"
                        class="w-full pl-9 pr-3 py-3.5 rounded-xl bg-black/40 border border-white/10 outline-none text-white focus:border-emerald-500/50 transition shadow-inner placeholder-slate-500 text-sm font-medium"
                        required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">📅</span>
                        <input type="date" id="evtStart"
                            class="w-full pl-9 pr-3 py-3.5 rounded-xl bg-black/40 border border-white/10 outline-none text-white focus:border-emerald-500/50 transition shadow-inner text-sm font-medium appearance-none cursor-pointer"
                            required>
                    </div>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🎨</span>
                        <select id="evtColor"
                            class="w-full pl-9 pr-3 py-3.5 rounded-xl bg-black/40 border border-white/10 outline-none text-white focus:border-emerald-500/50 transition shadow-inner text-sm font-medium cursor-pointer">
                            <option value="#10B981">Planting (Green)</option>
                            <option value="#F59E0B">Harvest (Orange)</option>
                            <option value="#3B82F6">Irrigation (Blue)</option>
                            <option value="#8B5CF6">Fertilizer (Purple)</option>
                            <option value="#EF4444">Urgent (Red)</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" id="saveBtn"
                class="btn-premium w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg shadow-emerald-500/20 border border-emerald-400/50 transition hover-scale mt-2">
                Save Event
            </button>
        </form>
    </dialog>

    <script src="js/toast.js"></script>
    <script>
        // --- CALENDAR LOGIC ---
        const token = localStorage.getItem('token');
        if (!token) location.href = 'index.html';

        let calendar;
        let eventList = [];

        document.addEventListener('DOMContentLoaded', async function () {
            const calendarEl = document.getElementById('calendar');

            // Standard FullCalendar initialization
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },
                themeSystem: 'standard', // we override standard theme locally
                selectable: true,
                height: '100%',
                contentHeight: '100%',
                dateClick: function (info) {
                    document.getElementById('evtStart').value = info.dateStr;
                    document.getElementById('eventModal').showModal();
                },
                events: async function (fetchInfo, successCallback, failureCallback) {
                    try {
                        const res = await fetch('/api/calendar', { headers: { 'Authorization': token } });
                        if (!res.ok) throw new Error("Offline");
                        const data = await res.json();
                        eventList = data.map(e => ({
                            id: e.id,
                            title: e.title,
                            start: e.start_date,
                            color: e.color
                        }));
                        successCallback(eventList);
                    } catch (err) {
                        // Mock data for display preview
                        if (eventList.length === 0) {
                            const today = new Date();
                            eventList = [
                                { id: 1, title: 'Plant Rice Phase 1', start: new Date().toISOString().split('T')[0], color: '#10B981' },
                                { id: 2, title: 'Irrigation Check', start: new Date(today.setDate(today.getDate() + 3)).toISOString().split('T')[0], color: '#3B82F6' },
                                { id: 3, title: 'Apply Fertilizer', start: new Date(today.setDate(today.getDate() + 5)).toISOString().split('T')[0], color: '#8B5CF6' }
                            ];
                        }
                        successCallback(eventList);
                    }
                }
            });
            calendar.render();

            // Handle window resize for calendar
            window.addEventListener('resize', () => {
                if (calendar) calendar.updateSize();
            });
        });

        async function saveEvent(e) {
            e.preventDefault();

            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="animate-spin text-lg">⏳</span>';
            btn.disabled = true;

            const payload = {
                title: document.getElementById('evtTitle').value,
                start_date: document.getElementById('evtStart').value,
                color: document.getElementById('evtColor').value
            };

            try {
                const res = await fetch('/api/calendar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': token },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    eventList.push({ ...payload, start: payload.start_date }); // Update local
                    toast.success('Event added to calendar!');
                } else {
                    throw new Error("Failed");
                }
            } catch (err) {
                // Offline handling
                payload.id = Date.now();
                eventList.push({ ...payload, start: payload.start_date });
                toast.success('Event added locally.');
            } finally {
                document.getElementById('eventModal').close();
                if (calendar) calendar.refetchEvents();
                e.target.reset();
                document.getElementById('cropDetailsPanel').classList.add('hidden');

                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // Auto helper logic
        let cropTimeout;

        async function fetchCropDetails(cropName) {
            if (!cropName) {
                document.getElementById('cropDetailsPanel').classList.add('hidden');
                return;
            }

            clearTimeout(cropTimeout);
            cropTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/calendar/crop-details?name=${encodeURIComponent(cropName)}`, {
                        headers: { 'Authorization': token }
                    });

                    let data;
                    if (res.ok) {
                        data = await res.json();
                    } else {
                        throw new Error();
                    }

                    if (data && data.found) {
                        populateCropHelper(data);
                    } else {
                        document.getElementById('cropDetailsPanel').classList.add('hidden');
                    }
                } catch (err) {
                    // Mock helper functionality
                    const mockDB = {
                        rice: { found: true, name: 'rice', season: 'Kharif', duration: '120 Days', water: 'High', temp: '25-35°C', soil: 'Clay', tips: 'Seedlings need 2-5cm standing water.' },
                        wheat: { found: true, name: 'wheat', season: 'Rabi', duration: '110 Days', water: 'Medium', temp: '15-25°C', soil: 'Loam', tips: 'Requires cool climate during growth.' }
                    };
                    const lowerName = cropName.toLowerCase().trim();
                    if (mockDB[lowerName]) {
                        populateCropHelper(mockDB[lowerName]);
                    } else {
                        document.getElementById('cropDetailsPanel').classList.add('hidden');
                    }
                }
            }, 300);
        }

        function populateCropHelper(data) {
            document.getElementById('cropDetailsPanel').classList.remove('hidden');
            document.getElementById('cdName').textContent = data.name.charAt(0).toUpperCase() + data.name.slice(1);
            document.getElementById('cdSeason').textContent = data.season;
            document.getElementById('cdDuration').textContent = data.duration;
            document.getElementById('cdWater').textContent = data.water;
            document.getElementById('cdTemp').textContent = data.temp;
            document.getElementById('cdSoil').textContent = data.soil;
            document.getElementById('cdTips').textContent = `💡 Tip: ${data.tips}`;

            // Auto-fill title if empty
            const titleInput = document.getElementById('evtTitle');
            if (!titleInput.value) {
                titleInput.value = `Planting ${data.name.charAt(0).toUpperCase() + data.name.slice(1)}`;
            }
        }
    </script>
    <script src="js/mobile-nav.js"></script>
</body>

</html>
